<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Antojados | Sabor Venezolano</title>
<style>
*{box-sizing:border-box}
body{margin:0;background:#020b0f;display:flex;justify-content:center;font-family:Arial,sans-serif}
.page{position:relative;width:100%;max-width:520px;background:#020b0f}
.flyer{width:100%;display:block}
.hotspot{position:absolute;display:block;border-radius:14px;text-indent:-9999px;overflow:hidden}
.hotspot:focus{outline:3px solid #fff;outline-offset:2px}

.promo{left:6.7%;top:48.0%;width:27.5%;height:3.1%}
.instagram{left:69.5%;top:34.4%;width:23.7%;height:4.3%}
.facebook{left:69.5%;top:39.3%;width:23.7%;height:4.3%}
.tiktok{left:69.5%;top:44.1%;width:23.7%;height:4.3%}
.share{left:68.6%;top:48.8%;width:24.8%;height:3.1%}
.whatsapp-main{left:4.4%;top:53.6%;width:30.1%;height:5.6%}
.call{left:36.0%;top:53.6%;width:27.9%;height:5.6%}
.contact{left:65.4%;top:53.6%;width:30.0%;height:5.6%}
.arepas{left:6.2%;top:64.1%;width:16.3%;height:11.4%}
.tequenos{left:24.4%;top:64.1%;width:16.3%;height:11.4%}
.burgers{left:42.0%;top:64.1%;width:16.3%;height:11.4%}
.cachapas{left:60.0%;top:64.1%;width:16.3%;height:11.4%}
.bebidas{left:78.0%;top:64.1%;width:16.3%;height:11.4%}
.menu{left:35.2%;top:76.4%;width:29.0%;height:3.4%}
.map{left:38.1%;top:88.0%;width:23.0%;height:3.2%}
.whatsapp-float{right:3.8%;bottom:3.3%;width:14.5%;height:9.8%;border-radius:50%;position:absolute;display:block;text-indent:-9999px;overflow:hidden}
</style>
</head>
<body>
<main class="page" aria-label="Antojados - Sabor Venezolano">
  <img class="flyer" src="antojados-landing.png" alt="Antojados">

  <a class="hotspot promo" id="promo" href="#">Promociones</a>
  <a class="hotspot instagram" id="instagram" href="#">Instagram</a>
  <a class="hotspot facebook" id="facebook" href="#">Facebook</a>
  <a class="hotspot tiktok" id="tiktok" href="#">TikTok</a>
  <a class="hotspot share" id="share" href="#">Compartir</a>
  <a class="hotspot whatsapp-main" id="whatsappMain" href="#">WhatsApp</a>
  <a class="hotspot call" id="call" href="#">Llamar</a>
  <a class="hotspot contact" href="antojados.vcf">Guardar contacto</a>
  <a class="hotspot arepas" id="arepas" href="#">Arepas</a>
  <a class="hotspot tequenos" id="tequenos" href="#">Tequeños</a>
  <a class="hotspot burgers" id="burgers" href="#">Burgers</a>
  <a class="hotspot cachapas" id="cachapas" href="#">Cachapas</a>
  <a class="hotspot bebidas" id="bebidas" href="#">Bebidas</a>
  <a class="hotspot menu" id="menu" href="#">Menú completo</a>
  <a class="hotspot map" id="map" href="#">Mapa</a>
  <a class="whatsapp-float" id="whatsappFloat" href="#">WhatsApp flotante</a>
</main>

<script>
const datosDefault={
  estado:"abierto",
  telefono:"1158393099",
  telefonoLink:"+541158393099",
  whatsapp:"541158393099",
  instagramUrl:"https://www.instagram.com/antojados.ar",
  facebookUrl:"https://www.facebook.com/Antojados",
  tiktokUrl:"https://www.tiktok.com/@antojados.ar",
  mapaUrl:"https://maps.google.com/?q=Av.+Balbin+1646+San+Miguel"
};

function wa(numero,texto){return "https://wa.me/"+numero+"?text="+encodeURIComponent(texto)}

function aplicarDatos(datos){
  const d={...datosDefault,...datos};

  if((d.estado||"").toLowerCase()==="cerrado"){
    window.location.replace("https://wa.me/"+d.whatsapp);
    return;
  }

  document.getElementById("promo").href=wa(d.whatsapp,"Hola Antojados, quiero ver las promociones");
  document.getElementById("whatsappMain").href=wa(d.whatsapp,"Hola Antojados, quiero hacer un pedido");
  document.getElementById("whatsappFloat").href=wa(d.whatsapp,"Hola Antojados, quiero hacer un pedido");
  document.getElementById("call").href="tel:"+d.telefonoLink;
  document.getElementById("instagram").href=d.instagramUrl;
  document.getElementById("facebook").href=d.facebookUrl;
  document.getElementById("tiktok").href=d.tiktokUrl;
  document.getElementById("map").href=d.mapaUrl;
  document.getElementById("arepas").href=wa(d.whatsapp,"Hola Antojados, quiero consultar por Arepas");
  document.getElementById("tequenos").href=wa(d.whatsapp,"Hola Antojados, quiero consultar por Tequeños");
  document.getElementById("burgers").href=wa(d.whatsapp,"Hola Antojados, quiero consultar por Burgers");
  document.getElementById("cachapas").href=wa(d.whatsapp,"Hola Antojados, quiero consultar por Cachapas");
  document.getElementById("bebidas").href=wa(d.whatsapp,"Hola Antojados, quiero consultar por Bebidas");
  document.getElementById("menu").href=wa(d.whatsapp,"Hola Antojados, quiero ver el menú completo");
  document.getElementById("share").href="https://wa.me/?text="+encodeURIComponent("Conocé Antojados 🇻🇪 https://dimas21093639-ux.github.io/-qr-dinamico/");
}

fetch("datos.json?nocache="+Date.now()).then(r=>r.json()).then(aplicarDatos).catch(()=>aplicarDatos(datosDefault));
</script>
</body>
</html>
